<!DOCTYPE html>
<html>
<head>
  <title>Claim Widget Demo</title>
  <link rel="stylesheet" href="dist/widget.style.css">
</head>

<body>

<h1>Claim Widget Demo</h1>

<label>JWT Token:</label>
<input id="token" style="width:700px">

<br><br>

<label>Status:</label>

<select id="statusFilter">
  <option value="">ALL</option>
  <option value="OPEN">OPEN</option>
  <option value="IN_REVIEW">IN_REVIEW</option>
  <option value="CLOSED">CLOSED</option>
</select>

<br><br>

<button onclick="openWidget()">Open Widget</button>
<button onclick="refreshClaims()">Fetch Claims</button>
<button onclick="openAdmin()">Admin Panel</button>

<script src="/dist/claim-widget.iife.js"></script>

<script>
const API_URL = "http://localhost:3000";

async function openWidget() {

  const token =
    document.getElementById("token").value;

  await ClaimWidget.init({
    token,
    apiUrl: API_URL
  });
}

async function refreshClaims() {
  openWidget();
}

function openAdmin() {

  const token =
    document.getElementById("token").value;

  if(!token){
    return alert("Enter token first");
  }

  window.open(
    "/admin.html?token=" +
    encodeURIComponent(token),
    "_blank",
    "width=1450,height=950"
  );
}
</script>

</body>
</html>
